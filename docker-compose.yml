services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 8788
      PB_URL: http://pocketbase:8090
    volumes:
      - ./data:/app/data
    depends_on:
      pocketbase:
        condition: service_healthy
    expose:
      - "8788"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8788/api/overseas/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
      args:
        PB_VERSION: ${PB_VERSION:-0.39.5}
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations:ro
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  pb_data:
  caddy_data:
  caddy_config:
