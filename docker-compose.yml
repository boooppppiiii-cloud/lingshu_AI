services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 8788
      PB_URL: http://pocketbase:8090
    volumes:
      - ./data:/app/data
    depends_on:
      - pocketbase
    expose:
      - "8788"

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
      args:
        PB_VERSION: ${PB_VERSION:-0.39.5}
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations:ro
    expose:
      - "8090"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - pocketbase

volumes:
  pb_data:
  caddy_data:
  caddy_config:
